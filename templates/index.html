<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Прогноз погоды</title>
</head>
<body>

    {% if mess %}
        <p>{{ mess }}</p>
    {% else %}
        <br>
    {% endif %}

    <form action="" method="get">
        <label for="city">Укажите город:</label>
        <input type="text" name="city" id="city">
    </form>
    <br>

    <p>Влажность : {{ humidity }}</p>
    <p>Давление : {{ pressure }}</p>
    <p>Температура : {{ temperature }}</p>
    <p>Погода : {{ weather }}</p>
    <p>Ветер : {{ wind }}</p>
    <p>Город : {{ сity }}</p>

    <br>
    КРУПНОЕ ИЗМЕНЕНИЕ

</body>
</html>
